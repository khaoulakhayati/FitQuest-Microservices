server:
  port: ${API_GATEWAY_PORT:8080}

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/fitquest}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/fitquest/protocol/openid-connect/certs}
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins: ${CORS_ORIGINS:http://localhost:4200}
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

fitquest:
  jwt:
    secret: ${JWT_SECRET:fitquest-super-secret-key-change-in-production-min-256-bits}
  keycloak:
    public-issuer-uri: ${KEYCLOAK_PUBLIC_ISSUER_URI:http://localhost:8180/realms/fitquest}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /v3/api-docs/auth
      - name: Workout Service
        url: /v3/api-docs/workout
      - name: Nutrition Service
        url: /v3/api-docs/nutrition
      - name: Challenge Service
        url: /v3/api-docs/challenge
      - name: Gamification Service
        url: /v3/api-docs/gamification
      - name: Social Service
        url: /v3/api-docs/social

logging:
  level:
    org.springframework.cloud.gateway: INFO
