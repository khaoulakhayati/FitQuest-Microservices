spring:
  datasource:
    url: jdbc:mysql://${MYSQL_AUTH_HOST:localhost}:${MYSQL_AUTH_PORT:3306}/${MYSQL_AUTH_DB:fitquest_auth}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_AUTH_USER:root}
    password: ${MYSQL_AUTH_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

fitquest:
  jwt:
    secret: ${JWT_SECRET:fitquest-super-secret-key-change-in-production-min-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
